<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0f14" />
    <meta name="description" content="RUTAYISIRE SERGE BLAISE Portfolio" />
    <title>🌟Bfame🥷</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dark: '#0c0f14',
              card: '#111a24',
              'glass-bg': 'rgba(22, 27, 34, 0.75)',
            },
            screens: {
              'xs': '480px',
            },
            fontFamily: {
              'inter': ['Inter', 'system-ui', 'sans-serif'],
            },
          }
        }
      }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
      /* Custom styles that can't be done with Tailwind utilities */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0c0f14;
        color: #e5e7eb;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0b0e12; }
      ::-webkit-scrollbar-thumb { background: #2c3a50; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
      
      /* Glass card effect */
      .glass-card {
        background: rgba(22, 27, 34, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .glass-card:hover {
        border-color: rgba(59, 130, 246, 0.15);
        transform: translateY(-2px);
      }
      
      /* Skill tags */
      .skill-tag {
        background: #1e293b;
        color: #b9c7e0;
        padding: 0.2rem 0.9rem;
        border-radius: 9999px;
        border: 1px solid #334155;
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
        transition: all 0.2s ease;
        cursor: default;
      }
      
      .skill-tag:hover {
        transform: scale(1.08);
        background: rgba(59, 130, 246, 0.12);
        border-color: rgba(59, 130, 246, 0.3);
        color: #e5e7eb;
      }
      
      /* Language scores */
      .lang-score {
        background: #1e293b;
        border-radius: 9999px;
        padding: 0.05rem 0.8rem;
        font-weight: 600;
        color: #a5b4d0;
        border: 1px solid #2d3a4f;
        display: inline-block;
        min-width: 2rem;
        text-align: center;
        transition: all 0.2s ease;
      }
      
      .lang-score:hover {
        transform: scale(1.1);
        background: rgba(59, 130, 246, 0.15);
        border-color: #3b82f6;
      }
      
      /* Referee cells */
      .referee-cell {
        background: #141b24;
        border-radius: 1rem;
        padding: 0.75rem 1rem;
        border-left: 3px solid #3b82f6;
        transition: all 0.2s ease;
      }
      
      .referee-cell:hover {
        transform: translateX(6px) scale(1.02);
        background: rgba(20, 27, 36, 0.9);
        border-left-width: 5px;
      }
      
      /* Animations */
      @keyframes bounce-slow {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .animate-bounce-slow {
        animation: bounce-slow 3.5s ease-in-out infinite;
      }
      
      @keyframes pulse-slow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s ease-in-out infinite;
      }
      
      @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-gradient {
        background-size: 200% 200%;
        animation: gradient 5s ease infinite;
      }
      
      /* Section animations */
      .animate-section {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .animate-section.visible {
        opacity: 1;
        transform: translateY(0);
      }
      
      /* Profile image */
      .profile-img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(59, 130, 246, 0.25);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
        transition: all 0.4s ease;
      }
      
      .profile-img:hover {
        transform: scale(1.05) rotate(-3deg);
        border-color: rgba(59, 130, 246, 0.5);
      }
      
      /* Line clamp */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      
      /* Custom scrollbar for history */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1a2332;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #3b82f6;
        border-radius: 10px;
      }
      
      /* Extra small screens */
      @media (max-width: 360px) {
        .skill-tag {
          font-size: 0.4rem !important;
          padding: 0.05rem 0.4rem !important;
        }
        .lang-score {
          font-size: 0.5rem !important;
          padding: 0.05rem 0.4rem !important;
          min-width: 1.2rem !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
