<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="RUTAYISIRE SERGE BLAISE - Software Engineer Portfolio | Full-Stack Developer, AI Enthusiast" />

  <meta property="og:title" content="BFAME | Software Engineer Portfolio" />
  <meta property="og:description" content="RUTAYISIRE SERGE BLAISE - Software Engineer Portfolio | Full-Stack Developer, AI Enthusiast" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/images/profile.jpg" />
  <meta property="og:url" content="https://bfame.dev" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BFAME | Software Engineer Portfolio" />
  <meta name="twitter:description" content="RUTAYISIRE SERGE BLAISE - Software Engineer Portfolio | Full-Stack Developer, AI Enthusiast" />
  <meta name="twitter:image" content="/images/profile.jpg" />

  <title>BFAME | Software Engineer Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#111827',
            card: '#1f2937',
          },
          screens: {
            xs: '480px',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html:not(.dark) body {
      background-color: #f8fafc;
      color: #1e293b;
    }

    html:not(.dark) ::-webkit-scrollbar-track { background: #e2e8f0; }
    html:not(.dark) ::-webkit-scrollbar-thumb { background: #94a3b8; }

    html:not(.dark) [class*="bg-gray-900"] {
      background-color: #f8fafc !important;
    }
    html:not(.dark) [class*="bg-gray-800"] {
      background-color: rgba(255, 255, 255, 0.92) !important;
    }
    html:not(.dark) [class*="bg-gray-700"] {
      background-color: rgba(241, 245, 249, 0.9) !important;
    }

    html:not(.dark) [class*="text-white"],
    html:not(.dark) [class*="text-gray-1"] {
      color: #1e293b !important;
    }
    html:not(.dark) [class*="text-gray-2"] {
      color: #334155 !important;
    }
    html:not(.dark) [class*="text-gray-3"] {
      color: #475569 !important;
    }
    html:not(.dark) [class*="text-gray-4"] {
      color: #64748b !important;
    }
    html:not(.dark) [class*="text-gray-5"] {
      color: #94a3b8 !important;
    }

    html:not(.dark) [class*="border-white"] {
      border-color: rgba(226, 232, 240, 0.8) !important;
    }
    html:not(.dark) [class*="border-gray-6"],
    html:not(.dark) [class*="border-gray-7"] {
      border-color: #cbd5e1 !important;
    }

    html:not(.dark) [class*="shadow-lg"],
    html:not(.dark) [class*="shadow-xl"],
    html:not(.dark) [class*="shadow-2xl"] {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06) !important;
    }

    html:not(.dark) footer {
      background-color: rgba(255, 255, 255, 0.92) !important;
      border-color: rgba(226, 232, 240, 0.8) !important;
    }

    html:not(.dark) input,
    html:not(.dark) textarea {
      background-color: #f1f5f9 !important;
      border-color: #cbd5e1 !important;
      color: #1e293b !important;
    }
    html:not(.dark) input::placeholder,
    html:not(.dark) textarea::placeholder {
      color: #94a3b8 !important;
    }
    html:not(.dark) input:focus,
    html:not(.dark) textarea:focus {
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
